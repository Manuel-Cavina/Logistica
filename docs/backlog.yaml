- key: E5-FE
  title: Búsqueda y exploración de ofertas frontend
  milestone: Sprint 4
  labels: [frontend, feature, busqueda-exploracion-ofertas, mvp]
  issues:
    - title: Crear formulario de búsqueda de ofertas para cliente
      objective: Dar al cliente un punto de entrada claro para buscar ofertas viables.
      implementation:
        - Crear vista o bloque de búsqueda con origin, destination, date y requiredCapacity
        - Validar campos obligatorios y formatos básicos
        - Conectar el submit con el endpoint real de búsqueda
      acceptance:
        - Existe el formulario de búsqueda
        - El formulario valida origen, destino, fecha y cupos
        - La búsqueda se ejecuta contra la API real
        - El usuario recibe feedback claro ante error de validación

    - title: Implementar vista de resultados de búsqueda
      objective: Mostrar ofertas compatibles de forma clara y reutilizable.
      implementation:
        - Renderizar listado de ofertas desde la respuesta del backend
        - Mostrar información mínima relevante en cada card o fila
        - Manejar estados de loading, empty y error
      acceptance:
        - Existe la vista de resultados
        - La vista consume la API real
        - Cada resultado muestra información útil para decidir
        - Los estados de loading, empty y error funcionan correctamente

    - title: Implementar filtros de búsqueda en la UI
      objective: Permitir refinar resultados sin abandonar el flujo de exploración.
      implementation:
        - Agregar controles para precio mínimo y máximo
        - Agregar control para solo verificados
        - Agregar control para desvío máximo
        - Sincronizar filtros con la consulta al backend
      acceptance:
        - El usuario puede filtrar por precio
        - El usuario puede filtrar por verificación
        - El usuario puede filtrar por desvío
        - La UI refleja correctamente los filtros aplicados

    - title: Implementar ordenamiento y paginación en resultados
      objective: Permitir navegar y priorizar resultados de forma cómoda y consistente.
      implementation:
        - Agregar selector de orden por precio, cercanía y rating
        - Implementar paginación con máximo 20 resultados por página
        - Mantener estado de búsqueda, filtros y orden al cambiar de página
      acceptance:
        - El usuario puede ordenar por precio, cercanía y rating
        - El usuario puede navegar entre páginas de resultados
        - La paginación respeta el máximo de 20 resultados por página
        - La navegación conserva filtros y ordenamiento activos

    - title: Implementar navegación desde resultados al detalle de oferta
      objective: Permitir profundizar en una oferta específica desde la exploración.
      implementation:
        - Agregar acción para abrir el detalle desde cada resultado
        - Resolver el id de oferta y consumir el endpoint de detalle público
        - Manejar errores de navegación o detalle no disponible
      acceptance:
        - Cada resultado permite abrir su detalle
        - La navegación al detalle funciona correctamente
        - La UI maneja correctamente ofertas inexistentes o no disponibles

    - title: Implementar vista de detalle completo de oferta
      objective: Mostrar toda la información necesaria para que el cliente entienda la oferta y pueda decidir.
      implementation:
        - Renderizar ruta, fecha, precio, capacidad disponible, desvío y condiciones
        - Mostrar resumen del transportista con verificación y rating
        - Dejar preparada la vista para futura acción de reserva sin acoplarla todavía
      acceptance:
        - El detalle de oferta muestra la información necesaria para decidir
        - La verificación del transportista es visible
        - El rating del transportista es visible
        - La capacidad disponible, precio y desvío se muestran claramente