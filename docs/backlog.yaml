- key: E6-FE
  title: Booking con anti-overbooking frontend
  milestone: Sprint 5
  labels: [frontend, feature, booking-anti-overbooking, mvp, critical]
  issues:
    - title: Implementar acción de iniciar reserva desde el detalle de oferta
      objective: Permitir que el cliente empiece el flujo de reserva desde una oferta disponible.
      implementation:
        - Agregar CTA principal de reserva en la vista de detalle de oferta
        - Validar que la oferta esté disponible y tenga capacidad visible
        - Resolver navegación hacia el flujo o pantalla de creación de booking
      acceptance:
        - El detalle de oferta permite iniciar una reserva
        - La acción solo está disponible para ofertas reservables
        - La navegación al flujo de booking funciona correctamente
        - La UI evita iniciar reserva sobre ofertas no disponibles

    - title: Crear formulario de booking con selección de cupos
      objective: Permitir que el cliente defina cuántos cupos quiere reservar de forma clara y segura.
      implementation:
        - Crear vista o bloque de booking con selector de requestedUnits
        - Mostrar capacidad disponible recibida desde la oferta
        - Validar requestedUnits mayor a cero y no mayor a la capacidad visible
      acceptance:
        - Existe el formulario de booking
        - El usuario puede seleccionar requestedUnits
        - La UI valida que requestedUnits sea mayor a cero
        - La UI valida que requestedUnits no supere la capacidad disponible visible

    - title: Mostrar snapshot de precio y resumen de reserva antes de confirmar
      objective: Dar claridad al cliente sobre el costo y las condiciones de la reserva antes de crear el booking.
      implementation:
        - Mostrar unitPrice de la oferta y cálculo estimado de total
        - Mostrar resumen con ruta, fecha, requestedUnits y precio total estimado
        - Aclarar visualmente que el precio final queda congelado al crear la reserva
      acceptance:
        - El usuario ve un resumen claro antes de confirmar
        - La UI muestra requestedUnits, precio unitario y total estimado
        - La información de ruta y fecha es visible en el resumen
        - La pantalla deja claro que la reserva genera un snapshot de precio

    - title: Integrar creación de booking contra la API real
      objective: Conectar la UI con el backend para crear bookings reales en estado PENDING_PAYMENT.
      implementation:
        - Consumir el endpoint POST /bookings
        - Enviar offerId y requestedUnits según contrato real
        - Manejar submit con loading, success y error
      acceptance:
        - La UI crea bookings usando la API real
        - El submit refleja estado de carga correctamente
        - La respuesta exitosa redirige o muestra el booking creado
        - Los errores de creación se muestran de forma clara

    - title: Manejar error semántico por falta de cupos en la UI
      objective: Informar correctamente al cliente cuando la capacidad ya no está disponible al momento de reservar.
      implementation:
        - Detectar respuesta 409 Conflict del backend
        - Mostrar mensaje claro de falta de cupos o capacidad insuficiente
        - Permitir reintentar o volver al detalle de la oferta
      acceptance:
        - La UI interpreta correctamente el error 409
        - El usuario recibe un mensaje claro cuando no hay cupos suficientes
        - La interfaz no queda en estado inconsistente tras el error
        - El usuario puede continuar el flujo sin recargar manualmente la app

    - title: Implementar vista de detalle de booking
      objective: Permitir que el cliente consulte la información principal de una reserva creada.
      implementation:
        - Crear pantalla o vista de detalle de booking
        - Consumir endpoint GET /bookings/:id
        - Mostrar estado, requestedUnits, snapshot de precio, expiración y resumen de oferta
      acceptance:
        - Existe la vista de detalle de booking
        - La vista consume la API real
        - El booking muestra estado, cupos solicitados, precio y expiración
        - El resumen de la oferta asociada es visible y entendible

    - title: Mostrar estado PENDING_PAYMENT y tiempo de expiración del booking
      objective: Hacer visible que la reserva bloquea cupos temporalmente y que tiene una vigencia definida.
      implementation:
        - Mostrar badge o estado visible PENDING_PAYMENT
        - Mostrar expiresAt en formato entendible
        - Agregar mensaje explicativo sobre la vigencia de la reserva
      acceptance:
        - El estado PENDING_PAYMENT se muestra claramente
        - La expiración del booking es visible para el usuario
        - La UI comunica que la reserva tiene duración limitada
        - La información se presenta de forma clara y no ambigua

    - title: Implementar cancelación de booking desde la UI
      objective: Permitir que el cliente cancele una reserva pendiente cuando la regla de negocio lo habilite.
      implementation:
        - Agregar acción de cancelación en bookings cancelables
        - Consumir endpoint o acción real de cancelación
        - Reflejar el nuevo estado y actualizar la vista tras cancelar
      acceptance:
        - La UI permite cancelar un booking cuando corresponde
        - La cancelación impacta contra la API real
        - El nuevo estado del booking se refleja correctamente
        - La vista no muestra acciones inválidas luego de cancelar

    - title: Cubrir estados de loading, empty, error y éxito del flujo de booking
      objective: Dar una experiencia robusta y profesional en todo el flujo visual de reserva.
      implementation:
        - Implementar estados de carga en creación y detalle de booking
        - Manejar errores de red, booking inexistente y respuestas inválidas
        - Mostrar feedback de éxito tras crear o cancelar una reserva
      acceptance:
        - El flujo muestra loading de forma consistente
        - Los errores de red y negocio se manejan correctamente
        - Un booking inexistente o inaccesible muestra feedback controlado
        - El usuario recibe confirmación clara en acciones exitosas

    - title: Agregar tests del flujo de booking frontend y validaciones de CI
      objective: Asegurar que el flujo visual de booking funcione correctamente y no rompa el pipeline del proyecto.
      implementation:
        - Crear tests de componentes y flujo para creación de booking
        - Cubrir validaciones de requestedUnits y manejo del error 409
        - Cubrir render de estado PENDING_PAYMENT, expiración y cancelación
        - Asegurar que pasen lint, typecheck, test y build
      acceptance:
        - Existen tests del flujo de creación de booking
        - Existen tests del manejo de error por falta de cupos
        - Existen tests de detalle y cancelación de booking
        - Pasan lint, typecheck, tests y build para mantener CI/CD en verde