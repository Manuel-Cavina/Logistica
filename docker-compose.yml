services:
  postgres:
    image: postgres:16
    container_name: logistica-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: logistica
    ports:
      - "5432:5432"
    volumes:
      - logistica_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d logistica"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  logistica_postgres_data: