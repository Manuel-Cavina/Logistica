name: Bug
description: Reportar un error o comportamiento inesperado
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: comportamiento_actual
    attributes:
      label: Comportamiento actual
      description: ¿Qué está pasando?
    validations:
      required: true

  - type: textarea
    id: comportamiento_esperado
    attributes:
      label: Comportamiento esperado
      description: ¿Qué debería pasar?
    validations:
      required: true

  - type: textarea
    id: pasos
    attributes:
      label: Pasos para reproducir
      placeholder: |
        1. Ir a...
        2. Hacer click en...
        3. Ver el error...
    validations:
      required: true

  - type: input
    id: entorno
    attributes:
      label: Entorno
      placeholder: "local / staging / producción — navegador, SO"

  - type: textarea
    id: contexto
    attributes:
      label: Contexto adicional
      description: Logs, screenshots, stack trace
