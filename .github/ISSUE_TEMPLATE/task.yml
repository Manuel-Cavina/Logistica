name: Tarea tecnica
description: Tarea de infraestructura, refactor, docs o deuda tecnica
title: "[TASK] "
labels: ["task"]
body:
  - type: dropdown
    id: lane
    attributes:
      label: Carril responsable
      options:
        - backend-e3
        - frontend-e2-redesign
        - shared-support
    validations:
      required: true

  - type: textarea
    id: descripcion
    attributes:
      label: Descripcion
      description: Que hay que hacer y por que
    validations:
      required: true

  - type: textarea
    id: criterios
    attributes:
      label: Definition of Done
      placeholder: |
        - [ ] X esta hecho
        - [ ] Tests pasan
        - [ ] Documentacion actualizada si aplica
    validations:
      required: true

  - type: input
    id: depends_on
    attributes:
      label: Dependencias
      placeholder: "#123, #124 o N/A"

  - type: textarea
    id: non_goals
    attributes:
      label: No hacer
      placeholder: |
        - No tocar contratos o modulos fuera del alcance
        - No tocar zonas protegidas sin aprobacion

  - type: dropdown
    id: tipo
    attributes:
      label: Tipo
      options:
        - Infraestructura
        - Refactor
        - Documentacion
        - Deuda tecnica
        - Configuracion
    validations:
      required: true
